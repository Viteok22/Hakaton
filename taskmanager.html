<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Задания - УмКабинет</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script src="components/navbar.js"></script>
<script src="components/footer.js"></script>
<script src="components/sidebar.js"></script>

<style>

body {

font-family: 'Inter', sans-serif;
background: linear-gradient(135deg,#f5f7fa 0%,#e4e7eb 100%);
min-height: 100vh;

}

.task-completed {

text-decoration: line-through;
opacity: 0.7;

}

.deadline-overdue {

background-color:#fee2e2;

}

.deadline-today {

background-color:#fef3c7;

}

</style>

</head>



<body class="px-4 py-8">

<custom-navbar></custom-navbar>

<div class="flex">

<custom-sidebar></custom-sidebar>



<div class="max-w-4xl mx-auto w-full">



<!-- HEADER -->

<div class="mb-10 text-center">

<h1 class="text-4xl font-bold text-gray-800 mb-2">

Student Task Manager

</h1>

<p class="text-gray-600">

Организуй свои задания и дедлайны

</p>

</div>



<!-- STATS -->

<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">

<div class="bg-white p-6 rounded-xl shadow-md">

<p class="text-sm text-gray-500">

Всего задач

</p>

<p id="total-tasks"

class="text-2xl font-bold text-gray-800">

0

</p>

</div>



<div class="bg-white p-6 rounded-xl shadow-md">

<p class="text-sm text-gray-500">

Ожидает выполнения

</p>

<p id="pending-tasks"

class="text-2xl font-bold text-gray-800">

0

</p>

</div>



<div class="bg-white p-6 rounded-xl shadow-md">

<p class="text-sm text-gray-500">

Выполнено

</p>

<p id="completed-tasks"

class="text-2xl font-bold text-gray-800">

0

</p>

</div>

</div>



<!-- FORM -->

<div class="bg-white p-6 rounded-xl shadow-lg mb-8">

<h2 class="text-xl font-bold mb-4">

Добавить новую задачу

</h2>



<form id="task-form"

class="space-y-4">

<input id="task-title"

required

placeholder="Название задачи"

class="w-full p-3 border rounded-lg">



<select id="task-priority"

class="w-full p-3 border rounded-lg">

<option value="high">

Высокий

</option>

<option value="medium">

Средний

</option>

<option value="low">

Низкий

</option>

</select>



<input type="date"

id="task-deadline"

class="w-full p-3 border rounded-lg">



<button

class="bg-blue-600 text-white px-6 py-3 rounded-lg">

Добавить задачу

</button>

</form>

</div>



<!-- TASKS -->

<div class="bg-white rounded-xl shadow-lg p-6">

<h2 class="text-xl font-bold mb-6">

Задачи

</h2>



<div id="tasks-container"

class="space-y-4">

</div>



<div id="empty-state"

class="text-center py-10">

<p class="text-gray-500">

У вас пока нет задач

</p>

</div>



</div>



</div>

</div>



<custom-footer></custom-footer>



<!-- SCRIPT -->

<script>

lucide.createIcons();



// =======================

let tasks =
JSON.parse(localStorage.getItem('studentTasks')) || [];



// DOM

const container =
document.getElementById('tasks-container');

const form =
document.getElementById('task-form');

const title =
document.getElementById('task-title');

const priority =
document.getElementById('task-priority');

const deadline =
document.getElementById('task-deadline');

const empty =
document.getElementById('empty-state');



// =======================

function loadTasks() {

container.innerHTML = '';

if (tasks.length === 0) {

empty.classList.remove('hidden');

}

else {

empty.classList.add('hidden');

tasks.forEach(task => {

const el =
createTaskElement(task);

container.appendChild(el);

});

}

updateStats();

lucide.createIcons();

}



// =======================

function createTaskElement(task) {

const div =
document.createElement('div');

div.className =
`bg-white p-4 rounded-xl shadow-md border-l-4
${getPriorityBorder(task.priority)}
${task.completed ? ' task-completed' : ''}`;

div.innerHTML = `

<div class="flex justify-between items-center">

<div>

<h3 class="font-semibold">

${task.title}

</h3>

<p class="text-sm text-gray-500">

Дедлайн: ${task.deadline}

</p>

</div>

<button onclick="deleteTask(${task.id})">

<i data-lucide="trash-2"></i>

</button>

</div>

`;

return div;

}



// =======================

function getPriorityBorder(priority) {

if (priority === 'high')
return 'border-red-500';

if (priority === 'medium')
return 'border-amber-500';

return 'border-green-500';

}



// =======================

function updateStats() {

document.getElementById('total-tasks')
.textContent = tasks.length;

document.getElementById('pending-tasks')
.textContent =
tasks.filter(t => !t.completed).length;

document.getElementById('completed-tasks')
.textContent =
tasks.filter(t => t.completed).length;

}



// =======================

form.addEventListener('submit', e => {

e.preventDefault();

const newTask = {

id: Date.now(),

title: title.value,

priority: priority.value,

deadline: deadline.value,

completed: false

};

tasks.push(newTask);

localStorage.setItem(
'studentTasks',
JSON.stringify(tasks)
);

form.reset();

loadTasks();

});



// =======================

window.deleteTask = id => {

tasks =
tasks.filter(t => t.id !== id);

localStorage.setItem(
'studentTasks',
JSON.stringify(tasks)
);

loadTasks();

};



// =======================

loadTasks();

</script>



</body>

</html>
