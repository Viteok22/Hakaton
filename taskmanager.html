<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Задания - УмКабинет</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/feather-icons"></script>

<script src="components/navbar.js"></script>
<script src="components/footer.js"></script>
<script src="components/sidebar.js"></script>

<style>

.task-completed {
text-decoration: line-through;
opacity: 0.7;
}

.deadline-overdue {
background-color:#fee2e2;
}

.deadline-today {
background-color:#fef3c7;
}

</style>

</head>



<body class="bg-gray-50">

<custom-navbar></custom-navbar>

<div class="flex">

<custom-sidebar></custom-sidebar>



<main class="flex-1 p-8">

<div class="max-w-7xl mx-auto bg-white rounded-xl shadow-lg p-6">

<!-- HEADER -->

<div class="flex justify-between items-center mb-8">

<h1 class="text-3xl font-bold text-indigo-800">
Задания
</h1>

<i data-feather="check-square"
class="text-indigo-600 w-8 h-8"></i>

</div>



<!-- СТАТИСТИКА -->

<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">

<div class="bg-indigo-50 p-6 rounded-xl">

<p class="text-sm text-gray-600">
Всего задач
</p>

<p id="total-tasks"
class="text-2xl font-bold text-gray-800">
0
</p>

</div>

<div class="bg-yellow-50 p-6 rounded-xl">

<p class="text-sm text-gray-600">
Ожидает выполнения
</p>

<p id="pending-tasks"
class="text-2xl font-bold text-gray-800">
0
</p>

</div>

<div class="bg-green-50 p-6 rounded-xl">

<p class="text-sm text-gray-600">
Выполнено
</p>

<p id="completed-tasks"
class="text-2xl font-bold text-gray-800">
0
</p>

</div>

</div>



<!-- ФОРМА -->

<div class="bg-indigo-50 p-6 rounded-xl mb-8">

<h2 class="text-xl font-bold text-indigo-800 mb-4">

Добавить новую задачу

</h2>



<form id="task-form" class="space-y-4">

<div class="grid md:grid-cols-2 gap-4">

<input
id="task-title"
required
placeholder="Название задачи"
class="w-full p-3 border rounded-lg">

<select
id="task-priority"
class="w-full p-3 border rounded-lg">

<option value="high">
Высокий
</option>

<option value="medium">
Средний
</option>

<option value="low">
Низкий
</option>

</select>

</div>



<input
type="date"
id="task-deadline"
class="w-full p-3 border rounded-lg">



<button
class="bg-indigo-600 hover:bg-indigo-700
text-white px-6 py-3 rounded-lg">

Добавить задачу

</button>

</form>

</div>



<!-- СПИСОК -->

<div class="bg-white rounded-xl shadow-sm p-6">

<h2 class="text-xl font-bold text-indigo-800 mb-6">

Задачи

</h2>



<div id="tasks-container"
class="space-y-4">

</div>



<div id="empty-state"
class="text-center py-10">

<p class="text-gray-500">

У вас пока нет задач

</p>

</div>



</div>



</div>

</main>

</div>

<custom-footer></custom-footer>



<script>

feather.replace();



// =================

let tasks =
JSON.parse(localStorage.getItem('studentTasks')) || [];



// DOM

const container =
document.getElementById('tasks-container');

const form =
document.getElementById('task-form');

const title =
document.getElementById('task-title');

const priority =
document.getElementById('task-priority');

const deadline =
document.getElementById('task-deadline');

const empty =
document.getElementById('empty-state');



// =================

function daysLeft(date) {

if (!date) return '';

const today =
new Date();

today.setHours(0,0,0,0);

const d =
new Date(date);

d.setHours(0,0,0,0);

const diff =
Math.ceil((d - today) / (1000*60*60*24));

if (diff < 0)
return `Просрочено на ${Math.abs(diff)} дн.`;

if (diff === 0)
return 'Сегодня';

return `Осталось ${diff} дн.`;

}



// =================

function loadTasks() {

container.innerHTML = '';

if (tasks.length === 0) {

empty.classList.remove('hidden');

}

else {

empty.classList.add('hidden');

tasks.forEach(task => {

const el =
createTask(task);

container.appendChild(el);

});

}

updateStats();

feather.replace();

}



// =================

function createTask(task) {

const div =
document.createElement('div');

const leftDays =
daysLeft(task.deadline);

let deadlineClass = '';

if (leftDays.includes('Просрочено'))
deadlineClass = 'deadline-overdue';

if (leftDays === 'Сегодня')
deadlineClass = 'deadline-today';

div.className =
`p-4 rounded-xl border-l-4 shadow-sm
${getPriorityColor(task.priority)}
${deadlineClass}
${task.completed ? ' task-completed' : ''}`;

div.innerHTML = `

<div class="flex justify-between items-center">

<div>

<h3 class="font-semibold">

${task.title}

</h3>

<p class="text-sm text-gray-500">

Дедлайн: ${task.deadline}

</p>

<p class="text-sm font-medium">

${leftDays}

</p>

</div>

<div class="flex gap-2">

<button onclick="toggleTask(${task.id})">

<i data-feather="check-circle"></i>

</button>

<button onclick="deleteTask(${task.id})">

<i data-feather="trash-2"></i>

</button>

</div>

</div>

`;

return div;

}



// =================

function getPriorityColor(priority) {

if (priority === 'high')
return 'border-red-500';

if (priority === 'medium')
return 'border-yellow-500';

return 'border-green-500';

}



// =================

function updateStats() {

document.getElementById('total-tasks')
.textContent = tasks.length;

document.getElementById('pending-tasks')
.textContent =
tasks.filter(t => !t.completed).length;

document.getElementById('completed-tasks')
.textContent =
tasks.filter(t => t.completed).length;

}



// =================

form.addEventListener('submit', e => {

e.preventDefault();

const newTask = {

id: Date.now(),

title: title.value,

priority: priority.value,

deadline: deadline.value,

completed: false

};

tasks.push(newTask);

localStorage.setItem(
'studentTasks',
JSON.stringify(tasks)
);

form.reset();

loadTasks();

});



// =================

window.toggleTask = id => {

const task =
tasks.find(t => t.id === id);

task.completed =
!task.completed;

localStorage.setItem(
'studentTasks',
JSON.stringify(tasks)
);

loadTasks();

};



// =================

window.deleteTask = id => {

tasks =
tasks.filter(t => t.id !== id);

localStorage.setItem(
'studentTasks',
JSON.stringify(tasks)
);

loadTasks();

};



// =================

loadTasks();

</script>



</body>
</html>
