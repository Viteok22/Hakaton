<script>

// =====================
// Инициализация иконок
// =====================

lucide.createIcons();


// =====================
// Данные
// =====================

let tasks =
JSON.parse(localStorage.getItem('studentTasks')) || [];

let currentFilter = 'all';
let currentPriority = 'all';


// =====================
// DOM элементы
// =====================

const tasksContainer =
document.getElementById('tasks-container');

const taskForm =
document.getElementById('task-form');

const taskTitle =
document.getElementById('task-title');

const taskPriority =
document.getElementById('task-priority');

const taskDeadline =
document.getElementById('task-deadline');

const taskCategory =
document.getElementById('task-category');

const taskDescription =
document.getElementById('task-description');

const emptyState =
document.getElementById('empty-state');

const clearFormBtn =
document.getElementById('clear-form');

const filterInfo =
document.getElementById('filter-info');


// Filter buttons

const filterAll =
document.getElementById('filter-all');

const filterPending =
document.getElementById('filter-pending');

const filterCompleted =
document.getElementById('filter-completed');

const priorityBtns =
document.querySelectorAll('.priority-btn');


// =====================
// Дата по умолчанию
// =====================

const today =
new Date().toISOString().split('T')[0];

const tomorrow = new Date();

tomorrow.setDate(tomorrow.getDate() + 1);

taskDeadline.value =
tomorrow.toISOString().split('T')[0];


// =====================
// Загрузка задач
// =====================

function loadTasks() {

  tasksContainer.innerHTML = '';

  let filteredTasks = tasks;

  if (currentFilter === 'pending') {

    filteredTasks =
    filteredTasks.filter(task =>
      !task.completed
    );

  }

  else if (currentFilter === 'completed') {

    filteredTasks =
    filteredTasks.filter(task =>
      task.completed
    );

  }

  if (currentPriority !== 'all') {

    filteredTasks =
    filteredTasks.filter(task =>
      task.priority === currentPriority
    );

  }


  // Сортировка по дедлайну

  filteredTasks.sort((a, b) => {

    if (!a.deadline) return 1;
    if (!b.deadline) return -1;

    return new Date(a.deadline) -
           new Date(b.deadline);

  });


  // UI

  if (filteredTasks.length === 0) {

    emptyState.classList.remove('hidden');

    filterInfo.textContent =
    'Нет задач по текущему фильтру';

  }

  else {

    emptyState.classList.add('hidden');

    filterInfo.textContent =
`Показано ${filteredTasks.length} задач${
currentPriority !== 'all'
? ` (приоритет: ${currentPriority})`
: ''
}`;

    filteredTasks.forEach(task => {

      const taskElement =
      createTaskElement(task);

      tasksContainer.appendChild(
        taskElement
      );

    });

  }

  updateStats();

  // 🔥 ВАЖНО — перерисовать иконки
  lucide.createIcons();

}



// =====================
// Создание элемента задачи
// =====================

function createTaskElement(task) {

  const priorityColors = {

    high: 'border-red-500',
    medium: 'border-amber-500',
    low: 'border-emerald-500'

  };

  const deadlineStatus =
  getDeadlineStatus(task.deadline);

  const div =
  document.createElement('div');

  div.className =
`task-item bg-white p-5 rounded-xl shadow-md border-l-4
${priorityColors[task.priority]}
${task.completed ? 'task-completed' : ''}
${deadlineStatus === 'overdue' ? 'deadline-overdue' : ''}
${deadlineStatus === 'today' ? 'deadline-today' : ''}`;

  div.id = `task-${task.id}`;

  const statusIcon =
  task.completed
  ? 'check-circle'
  : 'circle';

  div.innerHTML = `

<div class="flex items-start">

<button onclick="toggleTask(${task.id})"
class="mr-4 mt-1">

<i data-lucide="${statusIcon}"
class="${task.completed
? 'text-green-500'
: 'text-gray-400'} w-6 h-6"></i>

</button>

<div class="flex-1">

<h3 class="text-lg font-semibold text-gray-800 mb-1">

${task.title}

</h3>

${task.category
? `<span class="inline-block bg-blue-100 text-blue-700 text-xs px-2 py-1 rounded-full font-medium mb-2">
📚 ${task.category}
</span>`
: ''}

${task.description
? `<p class="text-gray-600 text-sm mb-2">
${task.description}
</p>`
: ''}

<div class="flex items-center flex-wrap gap-3">

<span class="text-sm text-gray-500 flex items-center">

<i data-lucide="clock"
class="w-4 h-4 mr-1"></i>

Дедлайн:
<span class="ml-1 font-medium">

${task.deadline || 'Без даты'}

</span>

</span>

<span class="text-sm text-gray-500 flex items-center">

<i data-lucide="flag"
class="w-4 h-4 mr-1"></i>

${getPriorityText(task.priority)}

</span>

</div>

</div>

<div class="flex space-x-2">

<button onclick="editTask(${task.id})"
class="text-gray-600 hover:text-blue-600">

<i data-lucide="edit"
class="w-5 h-5"></i>

</button>

<button onclick="deleteTask(${task.id})"
class="text-gray-600 hover:text-red-600">

<i data-lucide="trash-2"
class="w-5 h-5"></i>

</button>

</div>

</div>
`;

  return div;

}



// =====================
// Deadline статус
// =====================

function getDeadlineStatus(deadline) {

  if (!deadline) return 'none';

  const todayDate =
  new Date();

  todayDate.setHours(0,0,0,0);

  const d =
  new Date(deadline);

  d.setHours(0,0,0,0);

  if (d < todayDate)
    return 'overdue';

  if (d.getTime() === todayDate.getTime())
    return 'today';

  return 'future';

}



// =====================
// Текст приоритета
// =====================

function getPriorityText(priority) {

  const map = {

    high: 'Высокий',
    medium: 'Средний',
    low: 'Низкий'

  };

  return map[priority];

}



// =====================
// Статистика
// =====================

function updateStats() {

document.getElementById('total-tasks')
.textContent = tasks.length;

document.getElementById('pending-tasks')
.textContent =
tasks.filter(t => !t.completed).length;

document.getElementById('completed-tasks')
.textContent =
tasks.filter(t => t.completed).length;

}



// =====================
// Добавление задачи
// =====================

function addTask(e) {

  e.preventDefault();

  const title =
  taskTitle.value.trim();

  if (!title) {

    alert('Введите название задачи!');
    return;

  }

  const newTask = {

    id: Date.now(),

    title,

    priority: taskPriority.value,

    deadline: taskDeadline.value,

    category: taskCategory.value,

    description: taskDescription.value,

    completed: false

  };

  tasks.push(newTask);

  saveTasks();

  loadTasks();

  taskForm.reset();

}



// =====================
// Toggle
// =====================

window.toggleTask = function(id) {

  const task =
  tasks.find(t => t.id === id);

  task.completed =
  !task.completed;

  saveTasks();

  loadTasks();

};



// =====================
// Delete
// =====================

window.deleteTask = function(id) {

if (confirm('Удалить задачу?')) {

tasks =
tasks.filter(t => t.id !== id);

saveTasks();

loadTasks();

}

};



// =====================
// Edit
// =====================

window.editTask = function(id) {

const task =
tasks.find(t => t.id === id);

const newTitle =
prompt('Название:', task.title);

if (newTitle)
task.title = newTitle;

saveTasks();

loadTasks();

};



// =====================
// Save
// =====================

function saveTasks() {

localStorage.setItem(
'studentTasks',
JSON.stringify(tasks)
);

}



// =====================
// Фильтры
// =====================

filterAll.onclick = () => {

currentFilter = 'all';

loadTasks();

};

filterPending.onclick = () => {

currentFilter = 'pending';

loadTasks();

};

filterCompleted.onclick = () => {

currentFilter = 'completed';

loadTasks();

};

priorityBtns.forEach(btn => {

btn.onclick = () => {

currentPriority =
btn.dataset.filter;

loadTasks();

};

});



// =====================
// Очистка формы
// =====================

clearFormBtn.onclick = () => {

taskForm.reset();

};



// =====================
// Старт
// =====================

taskForm.addEventListener(
'submit',
addTask
);

loadTasks();

</script>
