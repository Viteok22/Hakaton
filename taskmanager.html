<script>

// Инициализация иконок
lucide.createIcons();
feather.replace();

// Загрузка задач
let tasks = JSON.parse(localStorage.getItem('studentTasks')) || [];

let currentFilter = 'all';
let currentPriority = 'all';

// DOM
const tasksContainer = document.getElementById('tasks-container');
const taskForm = document.getElementById('task-form');
const taskTitle = document.getElementById('task-title');
const taskPriority = document.getElementById('task-priority');
const taskDeadline = document.getElementById('task-deadline');
const taskCategory = document.getElementById('task-category');
const taskDescription = document.getElementById('task-description');
const emptyState = document.getElementById('empty-state');
const clearFormBtn = document.getElementById('clear-form');

// Filters
const filterAll = document.getElementById('filter-all');
const filterPending = document.getElementById('filter-pending');
const filterCompleted = document.getElementById('filter-completed');
const priorityBtns = document.querySelectorAll('.priority-btn');

// Завтрашняя дата по умолчанию
const tomorrow = new Date();
tomorrow.setDate(tomorrow.getDate() + 1);
taskDeadline.value = tomorrow.toISOString().split('T')[0];



// =====================
// Загрузка задач
// =====================

function loadTasks() {

  tasksContainer.innerHTML = '';

  let filteredTasks = tasks;

  if (currentFilter === 'pending') {
    filteredTasks = filteredTasks.filter(task => !task.completed);
  }

  if (currentFilter === 'completed') {
    filteredTasks = filteredTasks.filter(task => task.completed);
  }

  if (currentPriority !== 'all') {
    filteredTasks =
      filteredTasks.filter(task =>
        task.priority === currentPriority
      );
  }

  if (filteredTasks.length === 0) {

    emptyState.classList.remove('hidden');

  } else {

    emptyState.classList.add('hidden');

    filteredTasks.forEach(task => {

      const el = createTaskElement(task);
      tasksContainer.appendChild(el);

    });

  }

  updateStats();

  // 🔥 ОБЯЗАТЕЛЬНО
  lucide.createIcons();

}



// =====================
// Создание задачи
// =====================

function createTaskElement(task) {

  const div = document.createElement('div');

  div.className =
  `bg-white p-5 rounded-xl shadow-md border-l-4 
   ${getBorderColor(task.priority)}
   ${task.completed ? 'task-completed' : ''}`;

  div.innerHTML = `

<div class="flex items-start">

<button onclick="toggleTask(${task.id})"
class="mr-4 mt-1">

<i data-lucide="${
task.completed ? 'check-circle' : 'circle'
}" class="w-6 h-6"></i>

</button>

<div class="flex-1">

<h3 class="text-lg font-semibold text-gray-800">

${task.title}

</h3>

${task.category
? `<span class="text-sm text-blue-600">
📚 ${task.category}
</span>` : ''}

${task.description
? `<p class="text-gray-600 text-sm mt-1">
${task.description}
</p>` : ''}

<p class="text-sm text-gray-500 mt-2">

Дедлайн: ${task.deadline}

</p>

</div>

<div class="flex space-x-2">

<button onclick="editTask(${task.id})">

<i data-lucide="edit"
class="w-5 h-5"></i>

</button>

<button onclick="deleteTask(${task.id})">

<i data-lucide="trash-2"
class="w-5 h-5"></i>

</button>

</div>

</div>
`;

  return div;
}



// =====================
// Цвет приоритета
// =====================

function getBorderColor(priority) {

  if (priority === 'high')
    return 'border-red-500';

  if (priority === 'medium')
    return 'border-amber-500';

  return 'border-green-500';

}



// =====================
// Статистика
// =====================

function updateStats() {

  document.getElementById('total-tasks')
  .textContent = tasks.length;

  document.getElementById('pending-tasks')
  .textContent =
  tasks.filter(t => !t.completed).length;

  document.getElementById('completed-tasks')
  .textContent =
  tasks.filter(t => t.completed).length;

}



// =====================
// Добавление задачи
// =====================

function addTask(e) {

  e.preventDefault();

  const title = taskTitle.value.trim();

  if (!title) {
    alert('Введите название задачи!');
    return;
  }

  const newTask = {

    id: Date.now(),

    title,

    priority: taskPriority.value,

    deadline: taskDeadline.value,

    category: taskCategory.value,

    description: taskDescription.value,

    completed: false

  };

  tasks.push(newTask);

  saveTasks();

  loadTasks();

  taskForm.reset();

}



// =====================
// Переключение
// =====================

window.toggleTask = function(id) {

  const task =
  tasks.find(t => t.id === id);

  task.completed = !task.completed;

  saveTasks();

  loadTasks();

};



// =====================
// Удаление
// =====================

window.deleteTask = function(id) {

  if (confirm('Удалить задачу?')) {

    tasks =
    tasks.filter(t => t.id !== id);

    saveTasks();

    loadTasks();

  }

};



// =====================
// Редактирование
// =====================

window.editTask = function(id) {

  const task =
  tasks.find(t => t.id === id);

  const title =
  prompt('Название:', task.title);

  if (title)
    task.title = title;

  saveTasks();

  loadTasks();

};



// =====================
// Сохранение
// =====================

function saveTasks() {

  localStorage.setItem(
    'studentTasks',
    JSON.stringify(tasks)
  );

}



// =====================
// Очистка формы
// =====================

clearFormBtn.addEventListener('click', () => {

  taskForm.reset();

});



// =====================
// Фильтры
// =====================

filterAll.onclick = () => {

  currentFilter = 'all';
  loadTasks();

};

filterPending.onclick = () => {

  currentFilter = 'pending';
  loadTasks();

};

filterCompleted.onclick = () => {

  currentFilter = 'completed';
  loadTasks();

};



// =====================
// Старт
// =====================

taskForm.addEventListener(
  'submit',
  addTask
);

loadTasks();

</script>
